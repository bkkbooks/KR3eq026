front:
  text: 序夫師者指引之功也必須學者隨事精察真積力久而於師之引而不發者始得見其躍如者焉苟或不然師者未必能引進學者未必能起豫二者須先之也夫何益之有哉故曰不憤不啓不悱不發舉一偶不以三隅反則不復也其斯之謂歟豫於斂之名家獲睹是編觀其中之所語皆本丹溪先生之意門人弟子惟求其意而發其所未發者此所謂引而不發而得其躍如者焉豫深喜之遂録以歸後休之率口項君恬以疚來就豫治豫邑石墅陳子桷以醫而至豫館因出以示之二人者心意相得一則曰是可以益於吾疚也一則曰是可以補於吾醫也乃相告於豫曰吾二人共梓之以垂不朽何如豫曰醫乃仁術也筆之於書欲天下同歸於仁也今若刻布以廣其傳則天下病者有所益而天下醫者有所補其仁惠及於天下大矣豈特二子然哉此豫之所深嘉也又能善推豫之所欲推矣因題之曰推求師意故僭序之以志喜焉時嘉靖甲午七月五日新安汪機省之序序玉峰子以病諗惟宜惟宜醫學邃軒岐厥治多奇療士林推之尋厥徼妙則石山居士鑰之石山早服儒已旁托古方書搜厥大成以醫名時惟宜者復感通其旨緒相訂以言相成以意石山之精神命脈君子於是乎謂其有世之者也歲在午玉峰子養病江村適惟宜手其推求師意上下捲來示且再拜請序豫展誦之見其所論陰陽變狀並所原病脈以酌厥劑者直下膜見參素難以出玄詳其所著知其為丹溪未竟之意其門人戴元禮者闡之編而次其意者石山校而壽其意者惟宜也喟曰甚矣醫理之艱也匪醫之艱維意之艱夫醫傳言也言所弗傳忘言也以神遇弗以言遇則竅以神批竅以意導理生於及慧生於弗及刃有餘用目無全解矣否則糟粕也矣膠焉而弗化也奚其醫丹溪授千古醫學之心法弗能巧人也元禮乃能冥會其意而推闡其所未盡石山會丹溪元禮心法之精思欲世其仁也惟宜乃能宏拓其意而成就其所欲為世恆道醫古今弗相及今石山惟宜邃厥醫以傳謂為丹溪元禮非歟故曰廣丹溪之志者元禮也廣元禮之志者維石山作之維惟宜述之也方今陰陽有沴疢癘繁生世可蔑斯人也與哉或曰所學于丹溪者衆專其論著為元禮也者何姬曰丹溪之門稱高第者元禮也理邃以玄論微而著微元禮吾弗知其有也是故以是歸之也嘉靖甲午季秋之望玉峰王諷撰
