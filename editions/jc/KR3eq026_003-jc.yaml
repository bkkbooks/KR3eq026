body:
  text: 卷之下大風丹溪取醉仙再造以分上下用也內經曰脈風成為癧風又曰風寒客於肺而不去名癧風癧風者榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰又謂風氣與太陽俱入行諸脈俞散諸分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉有不仁也刺長節論曰病大風骨節重鬚眉墮刺肌肉汗出百日王注泄衛氣之怫熱刺骨髓汗出百日王注以泄榮氣之怫熱凡二百日鬚眉生而止靈樞曰癧風者數刺其腫上以鋒針針其處按出其惡氣腫盡乃止當食方食毋食他食經論分榮衛者如此古方但混泄風熱於榮衛又無先後之分惟活法機要用樺皮散治其衛二聖散治其榮二聖即再造也出三因方先生言再造用鬱金半兩白醜六錢半生半炒皂角刺經年黑大者今選二方分氣血上下先後而用蓋以氣為陽為衛血為陰為榮身半以上陽先受之身半以下陰先受之再造治其病在陰者用皂刺出風毒於榮血中肝主納血惡血留止屬於肝也蟲亦主於厥陰風木所化須是治其臟氣殺蟲為主以大黃引入腸胃榮血之分利下惡血蟲物醉仙散治其病在陽者用鼠黏子出風毒遍身惡瘡胡麻逐風補肺潤皮膚蒺藜主惡血身體風癢通鼻氣防風治諸風栝蔞根治瘀血足熱胕腫枸杞消風毒熱散瘡腫蔓荊子主賊風苦參治熱毒風皮肌煩躁生瘡赤癩眉脫八味治風至矣然必銀粉為使乃下膈通大腸要劑用其驅藥入陽經開風熱怫鬱痞結逐出惡氣臭穢之毒殺所生之蟲隨經上行至牙齒嫩薄之分出其臭毒之涎水此藥傷齒則以黃連末揩之或先固濟以解銀粉之毒銀粉在醉仙散有奪旗斬將之功遂成此方之妙用非他方可及餘邪未除但調和榮衛藥中少加驅逐耳一人面浮油光微腫色變眉脫癢二世癘風死者三人與醉仙散出涎水如盆而愈一人面腫色變黑燥癢眉須脫落手足皮燥厚折痛癢無全膚有時癢入骨髓抓至血出稍止復作晝夜不眠與二藥則愈一婦兩足脛瘡潰眉落與再造散一服愈年少不能斷欲忌口一年復發其前二人不復發者非能如法調攝由病得之未深鼻柱未壞瘡未潰胕故耳故人抱病不可不早治也痛風即內經風寒濕三氣雜至合而為痹也雖言寒為痛痹然三者皆能作痛但寒勝者痛甚如掣濕者痛著如腫風者其痛行動無常處悉因凝滯之痹與流行榮衛真氣相擊搏則作痛痹若不幹其流行出入之道則不痛但痿痹耳隨其痹所在或陽多陰少則為痹熱或陰多陽少則為痹寒或骨重或筋攣不伸肌肉不仁或血脈凝而不流或在皮則寒或逢熱則縱後人就中摘出為痛者分六條具數百方夫藥在乎明道不在多言苟明其道雖一言一方亦可類推道若不明奚適於用而取擇焉今六條中有謂由風寒濕氣則血凝澀不得流通關節諸筋無以滋養真邪相搏歷節痛者有謂風百節痛者有謂風氣走注痛無常處者有謂白虎風者或在骨節或走四肢晝靜夜發發則痛徹入骨有風腰痛者豈非悉是風寒濕三氣痹而痛乎曰痹論止言寒為痛痹未聞行痹亦痛曰靈樞周痹篇有眾痹有周痹即此云也又內經四時刺逆從論篇於六經皆云有餘不足悉為痹注曰痹痛也此非人氣之邪亦作痛耶今以一條而舉眾病何也蓋因是集有所未備耳且人身體痛在外有皮肉脈筋骨之異由病有不同之邪亦各欲正其名名不正將何以施治如邪是六淫者便須治邪是人氣者便須補瀉其氣病在六經四屬者各從其氣故制方須宜分別藥之輕重緩急適當其所庶得經意疝內經謂任脈為病男子內結七疝女人帶下瘕聚衝脈為氣逆裡急云云又云少陰脈滑肺風疝太陰脈滑脾風疝陽明心風疝太陽腎風疝少陽脈滑肝風疝由外邪入於木木陽臟起動風也故滑脈曰風然連稱疝者蓋腎肝同居下焦而足厥陰佐任脈之生化固肝腎之氣並逆所以腎之陰氣為疝肝之陽氣為風又有莖垂者身中之機陰陽之候津液之道或飲食不節喜怒不時津液內溢下流於睪血道不通血道不通則俯仰趨翔不便又巢氏云云而張戴人非之曰此俗工所立謬名也蓋環陰器上抵少腹屬足厥陰肝經部分此是受病之處或在泉寒勝木氣攣縮禁於此經或司天燥勝木氣抑鬱於此經或忿怒悲哀憂抑頓銼或藥淋外固閉尾縮精壅於此經與膀胱腎小腸了不相干也且疝者非肝木受邪則肝木自甚也由是於陰疝中亦立七名曰寒疝水疝筋疝血疝氣疝狐疝㿗疝也寒疝囊冷結縮如石陰莖不舉或連控丸而痛得於坐臥濕地及磚石或冬月涉水或值雨雪或風冷處使內過勞宜以溫劑下之久而無子水疝腎囊腫痛陰汗時出囊腫如水品或囊癢搔出黃水或小腹按之作水聲得之飲水醉酒使內過勞汗出而遇水寒濕氣聚於囊中故水多令人為卒疝宜以逐水之劑下之筋疝陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下得之於房室勞傷及邪術所使宜以降心火之劑下之血疝狀如黃瓜在小腹橫骨兩端約中俗云便癰得於重感春夏大燠勞於使內氣血流溢滲入脬囊不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號泣忿怒鬱而脹怒號罷則氣散是也宜以散氣之劑下之小兒亦有此疾俗曰偏氣得於父已年老或年少多病陰痿精怯強力入房因而有此乃胎病也此病不治狐疝其狀如丸臥則入腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴不溺此疝出入上下往來與狐相似亦與氣疝大同小異今人帶鉤鈐是也宜以逐氣疏經之藥下之㿗疝囊腫縋如升斗不癢不痛是也得之地氣卑濕故江淮湫溏之間多此宜以去濕之劑下之諸下去後可調則調可補則補各量病勢勿執俗法經謂陰盛腹脹不通者㿗癃疝也不可不下雖然戴人既用內經靈樞明堂之論止從足厥陰分而不及任脈蓋因力辨陰器屬厥陰部分受病故未暇及任脈也其治法因病在下皆先下之不問虛實欠於周悉丹溪常論睪丸連小腹急痛者或有形無形或有聲無聲人皆為經絡得寒則收引不行而作痛不知此痛始於濕熱鬱遏至久又感外寒濕熱被鬱而作痛也初致濕熱之由蓋大勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於肺火鬱之久濕氣便盛濁液凝聚併入血隧流於厥陰肝木性急火又暴烈為寒所束宜其病甚而暴也此則發明戴人之未至又㿗疝不離三者之邪熱則縱寒則痛濕則腫須分三者多少而治之兩丸俱病固然也更有偏於一者腎有兩分左右左屬水水生肝木木生心火三部皆司血統納左之血肝木之職也右屬火火生脾土土生肺金三部皆司氣統納右之氣肺金之職也是故諸寒收引則血泣所以寒血從而歸肝下注於左丸諸氣膹鬱則濕聚所以氣濕從而歸肺下注於右丸且睪丸所絡之筋非盡由厥陰而太陽陽明之筋亦入絡也往往見患偏左則痛多腫少偏右則痛少腫多可驗也一人病後飲水病左丸痛甚灸大敦以摩腰膏摩囊上上抵橫骨炙溫帛覆之痛即止一宿腫亦消予舊有甘橘積後山行飢甚食橘芋橘動舊積芋復滯氣即時寒熱右丸腫大先服調胃劑一二帖次早注神使氣至下焦覺積動嘔逆吐之復吐後和胃氣疏通經絡而愈內傷東垣謂百病之源皆由喜怒飲食勞役所傷脾胃而然其元氣穀氣營氣清氣衛氣生髮諸陽之氣此六者皆胃氣之別稱也脾胃既傷則中氣不足中氣不足則不能滋養元氣不能滋養元氣則臟腑之真氣皆不足惟陰火獨旺上乘陽分無形質元氣受病矣系在上焦心肺之氣絕於外心主榮肺主衛故榮衛失守諸病生焉此論發熱盡由於內傷也及河間所言則又不止此也曰天真者造化之元氣也在身亦得執天機而行六氣分地紀而運五行巡歷周身化生萬物若調攝適宜邪不能傷或憂愁思慮飢飽勞逸大驚卒恐真氣耗亂血氣分離其五行六氣遂有愆陽伏陰興衰之變則百病作矣於是著原病式以明其道取至真要大論之病機以為提綱用五運主病者以言五臟所屬木火土金水之變用六氣為病者以言三陰三陽所屬風寒濕熱燥火氣之變在五行則以金水易衰火木易盛在六氣則以濕熱相火二氣為病獨多至於五行過極亢則害承乃制反兼鬼賊之化此皆得為發熱之病豈止由於脾胃所始乎先生不以一家之學自至益求其未至乃謂天之陽大於地之陰地之陰常不敵夫天之陽人稟天之陽為氣地之陰為血所以氣常有餘血常不足此年四十而陰氣已衰半矣故人不可恣欲以自戕必保養天和庶幾陰無虧缺可與陽齊以終天年夫天和者天真元氣也負陰抱陽元精立其體元神致其用苟不搖其精則體全而用不竭不勞其神則用專而體不虧然精之秘非惟奉養天真而已精秘則陰實經曰陰成形陰實則形全陰虛則形敝敝則出入廢升降息孤陽之氣安得不亢而飛越乎先生嘗曰人因喜怒勞役色欲之火煎熬腎水枯竭精血而病者十常六七夫五臟皆屬陰而藏精者也腎又五臟陰氣之主故受五臟之精而藏之故諸陰精血之病皆本於腎其輸納之際必詳察焉大抵效仲景八味丸以五味各入五臟益其精其中桂附之辛開腠理致津液通氣道輸而與之補腎之法固不越規矩然地道之陰虛則天道之陽不降或陽亂於下而少陰之氣不得收藏者或精絕闢積而不輸者或兩腎陰陽自有偏者必皆揆度以治然元氣者在身有根有苗在太虛非陰非陽其根也自天地開發周流上下四方隨其所至以化行者仲景所謂五臟元真是也在肝則溫化其氣升在心則熱化其氣浮在脾則沖和之化其氣備在肺則涼化其氣降在腎則寒化其氣藏猶天以一元之氣行於四時也此苗也各從其本臟之元真而論治元氣所化者不足則從其所化補之元真所化者太過則反其所化瀉之然則論元氣獨在脾胃者此重水穀以資天真也先生兼之受精以全形者則又重兩腎為元精立壽命本始之地也錢仲陽於腎有補無瀉正此意耳二者皆從根本而治也中風中風論治先生以內經正局方之非以濕熱內傷補仲景之未備獨河間戴人東垣能發明此三者河間曰中風癱瘓非肝木實甚而發中之也亦非外中於風由乎平日衣服飲食安處動止精魂神志情性好惡五志過極不循其宜致失其常久則氣變興衰而心火暴甚腎水衰弱不能制之則陰虛陽實而熱氣怫鬱心神昏眊筋骨不用而卒倒無所知也戴人曰暴僵暴僕皆屬厥陰肝木之無制也肝木自甚獨風為然蓋肺金為心火所制不能勝木故耳東垣曰凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者壯歲肥盛之人形盛氣衰者皆致中風治法當和臟腑通經絡或曰劉張二氏猶用風藥佐輔瀉火之劑以開鬱結散其風熱今丹溪全然不用乃從痿治何也曰先生但不用其發表傷衛之劑至若鼠黏子之散支節筋骨咽喉風熱毒起陰氣通十二經脈者也則於是症嘗用之雖作痿治然於散肝木之風解鬱結之熱皆在其中矣其大法泄心火則肺金清而肝木不實故脾不受傷補腎水則心火降而肺不受熱脾肺安則陽明實陽明實則宗筋潤能束骨而利機關矣復以東垣所治黃柏與黃耆等補藥為佐輔有兼痰積有熱多有濕熱相半臨病制方無一定之法善於治痿者乎竊論陽明者胃脈也胃乃水穀之海經曰人以胃氣為本無胃氣則死蓋元精元氣元神不可一日無水穀以養之其水穀藥石入胃而氣屬陽味屬陰屬陽者則上輸氣海屬陰者則下輸血海二海者氣血之所歸五臟六腑十二經脈皆取資於此故二海盈溢則一身內外氣血皆充足矣氣充則榮衛流行而手足百骸之力湧出矣血充則衝脈引以滲灌於溪谷而四屬九竅各為之用而帶脈得以約束十二經脈不至於緩縱痿弱矣先生用是以治中風癱瘓緩弱之病可為法於後矣嚴氏必先理氣為說是不識氣因火而沖反用辛溫助火散氣誤人多哉暑金匱要略云太陽中暍發熱惡寒身重而痛其脈弦細芤遲小便已灑然毛聳手足逆冷小勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚其人汗出惡寒身熱而渴白虎加人參湯主之其人身熱疼重而脈微弱此夏傷水水行皮中所致一物瓜蒂湯主之東垣分暑病有二或避暑深堂大廈靜而得之名中暑中暑陰症也必頭疼惡寒身形拘急支節疼痛而煩心肌膚火熱無汗當用大順散以發散是也若行人農夫於日中勞役動而得之名中熱中熱陽症也為熱傷元氣必苦頭痛發燥熱惡熱捫之火熱大渴引飲汗大泄無氣以動乃天熱外傷肺氣蒼朮白虎湯主之是也舉此二方以為例耳非令人執守之也別論有先因勞役飲食虛損脾胃宿疾之人遇暑將理失宜違時伐化必困乏無力精神短少氣弱氣促似喘非喘諸陽虛之症不一而見甚則傳於腎肝諸痿厥之病作矣為脾主四肢故也制黃耆人參湯主之在長夏濕熱之令有清暑益氣湯主之隨症加減蓋此勞與行人之勞何異此之飢飽於人寧無飲食之虛損者哉豈非人參黃耆可與白虎湯相參合一迭相為用耶雖在脾胃先損後或受暑熱之勝至大渴引飲煩悶肌熱亦必於黃耆人參湯中加石膏知母為佐可也經曰火淫所勝治以辛寒以甘瀉之石膏味甘辛寒治暑熱傷脾肌熱之功他藥所不及然而清暑益氣湯治暑而無石膏何也因脾胃虛損當夏令火熱而病非中其熱又胃弱不耐石膏之寒降恐生髮之氣不升故耳或暑熱乘虛而感之又安得不用其為佐乎若中熱者雖以白虎為主或元氣虛甚亦安得不用參耆為佐乎注夏先生謂陽有餘陰不足若恣欲泄精無度至夏必陽氣輕浮有頭痛腳軟食少發熱之患即注夏也注者灌也先因陰虛不勝夏令暑熱灌之其病則劇非中熱也仲景謂勞之為病其脈浮大手足煩春夏劇秋冬瘥是也東垣所謂脾胃元氣先損至夏而病作用黃耆人參湯亦注夏也蓋暑熱之氣不止傷陰而亦損陽東垣治損陽者重在於胃以氣為要先生治傷陰者重在脾腎以精血為要精藏於腎血化於脾皆陰臟也注夏之名固同及分陰陽用藥則不同也治陰虛者非質重味厚屬脾胃之君藥安能固其陽根而斂其輕浮之氣乎暑風即中暑也可用吐法其人必內先有火熱痰實因避暑納涼風入襲之鬱而成病或身熱或昏冒是以用吐吐中有汗火鬱得汗則解風得汗則散痰得湧則出一舉三得此先生當時治挾痰者非通治暑風之大法也無所挾者惟宜汗散濕濕有天之濕霧露雨是也天本乎氣故先傷表之榮衛水泥地之濕也地本乎形故先傷皮肉筋骨血脈酒水乳酪飲食之濕也胃為水穀之海故先損脾胃有汗液之濕亦氣也止感於外有氣之濕屬足太陽所化者也治天之濕當同司天法濕上甚而熱者平以苦溫佐以甘辛以汗為故治地之濕當同在泉法濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之飲食之濕在上者吐之在中者奪之在下引而竭之汗液同司天治惟人氣屬太陰脾土所化之濕者在氣交之分與前四治有同有異何則土兼四氣寒熱溫涼升降浮沉備在其中脾胃者陰陽地位更虛更實更從更逆是故陽盛則木勝合為風濕至陽勝則火勝合為濕熱陰盛則金勝合為燥熱至陰勝則水勝合為寒濕為兼四氣故淫泆上下中外無處不到在上則嘔吐頭重胸滿在外則身重腫脹在下則足脛跗腫中滿痞塞當隨其上中下外兼寒熱溫涼以為佐使至若先因乘克以致脾虛津積而成濕者則先治勝克之邪或脾胃本自虛而生濕者則用補虛為主或熱鬱而成濕者則以散熱為要或脾胃之濕淫泆流於四臟筋骨皮肉血脈之間者大概濕主痞塞以故所受之臟氣澀不得疏通故本臟之病因而發焉其筋骨皮肉血脈受之則發為痿痹緩弱痛重不任為用所治之藥各有所入凡切於治便為要藥豈蒼朮一味儘可用哉先生寧肯語此以示人也濕淫諸症治藥並在各病條下郁病郁病多在中焦六郁例藥誠得其要中焦者脾胃也胃為水穀之海法天地生萬物體乾坤健順備中和之氣五臟六腑皆稟之以為主榮衛天真皆有穀氣以充大東垣謂人身之清氣榮氣運氣衛氣春升之氣皆胃氣之別稱然豈盡胃氣乃因胃氣以資其生故脾胃居中心肺在上腎肝在下凡有六淫七情勞役妄動故上下所屬之臟氣致有虛實克勝之變而過於中者其中氣則常先四臟一有不平則中氣不得其和而先郁更因飲食失節停積痰飲寒濕不通而脾胃自受者所以中焦致郁多也今藥兼升降而用者蒼朮陽明藥也氣味雄壯辛烈強胃健脾開發水穀氣其功最大香附子陰血中快氣藥也下氣最速一升一降以散其鬱撫芎手足厥陰藥也直達三焦俾生髮之氣上至目頭下抵血海疏通陰陽氣血之使也然此不專開中焦而已且胃主行氣於三陽脾主行氣於三陰脾胃既有水穀之氣行從是三陰三陽各臟腑自受其燥金之郁者亦必用胃氣可得而通矣天真等氣之不達者亦可得而伸矣況蒼朮尤能徑入諸經疏泄陽明之濕此六郁藥之凡例升降消導皆自內經變而致之殆於受病未深者設也云云下郁乃燥之別名屬肺金之化治郁之法有中外四氣之異在表者汗之在內者下之兼風者散之熱微者寒以和之熱甚者瀉陽救水養液潤燥補其已衰之陰兼濕者審其溫之太過不及猶土之旱澇也寒濕之勝則以苦燥之以辛溫之不及而燥熱者則以辛溫之以寒調之大抵須得仲景治法之要各守其經氣而勿違火臟氣有實有虛若陽盛水哀而動者則從河間治法瀉熱救水若陽虛不足而動者則陽愈虛當從東垣必補胃氣次瀉其火陽虛不安其位而火乘於陰依東垣自陰升陽提而出之陽盛入於陰者遵仲景下之陰虛不勝夫火動者用先生益精血壯腎水以安之或臟氣盛與火齊發先瀉其盛本臟氣血不足先補其虛次瀉其火火與氣相持鬱伏不行則發臟氣云云其半則散火為主臟氣鬱其火溺血大抵溲血淋血便血三者雖前後陰竅所出不同然於受病不一故治法分標本一也其散血止血之藥無下數十品惟引導佐使各走其鄉者小異耳溺血為熱客下焦本草何仍用菟絲子肉蓯蓉續斷鹿角輩溫補壯陽為主內經謂邪之所湊其氣必虛東垣謂火與元氣不兩立一勝則一負火者熱也腎氣因熱而走亦必用是臟真之藥始可補其虛以固衛氣之散走也氣血相須為用又何疑乎痰飲內經有脾胃濕土太過為積飲痞膈與飲積於中者數條未有痰之名也至仲景始分飲為四一曰痰飲二曰懸飲三曰溢飲四曰支飲而痰之義始見河間分五運六氣之病於火淫條下則云中風風癩等病痰涎因水衰熱甚津液湧溢聚於胸膈熱燥以為痰涎初虞世言涎者乃遍身之脂脈津液於濕土條下云濕氣自甚則為積飲痞膈中滿霍亂又云喘嗽之痰為因外感風寒寒化為熱熱則生痰張戴人謂留飲一症不過蓄水而已又謂四飲者觀病之形狀而定名也其來有五有膹鬱而得之者其氣抑鬱不伸則肝氣乘脾脾氣不濡故為留飲有勞役乘困飲水脾胃力衰因時睡臥不能布散於脈亦為留飲肝主慮久慮不決則肝氣不行脾主思久思不已則脾氣結亦為留飲飲酒過多以乘燥金胞不滲泄亦為留飲隆暑津液焦涸喜飲寒水過多逸而不動亦為留飲又謂痰有五曰風痰曰熱曰濕曰酒曰食五者先生遵張劉之說謂痰飲之初起也或飲食不謹或外傷六淫或內感七情或食味過厚皆致穀氣不升資發榮衛先鬱滯而成膈熱故津液不行易於攢聚因氣成積積氣成痰痰飲既聚展轉傳變生病不一為嘔吐為反胃為喘滿為咳逆為膈噫為吞酸為嘈雜為膨脹為痞為痛為泄利為不食衝上為頭痛為眩運嗌下為足腫為㿗疝散於表為寒熱為胕腫為肢節痛聚於心為狂為癲昏僕為不語凡人之病皆痰為邪此數家敘痰為病之始末也後世論治痰飲必得溫乃行及有痰因火熱反見水化而覺其冷乃不知其熱也先生故多不取獨稱長沙治四飲之法可表者汗之可下者利之滯者導之郁者揚之熱者寒之寒者溫之塞者通之虛者補而養之深得內經各隨攸利所治之意竊謂痰飲之生有生於脾胃有生於六經所起不同若論感邪與為病之形症則一也至於治之必先從其邪之所起而後及於病之所止曰痰飲因太陰濕土之化生於脾胃寧不生於六經乎初虞世謂涎為遍身之脂脈津液也此非六經中之津液灌注於內外者歟原其在經脈之由即內經所謂飲入於胃遊溢精氣散精於脾上歸於肺通調水道下輸膀胱水精四布五經並行又謂水入於經其血乃成謂五臟化五液心為汗肝為泣肺為涕脾為涎腎為唾故經脈之津液與血者皆四布水精之所化然經脈以胃氣為本則其所化亦六經中胃氣土德之沖和者以成之由是同歸乎濕滋育百體者矣苟不善於化則水積不行亦如濕漂之為害故其水盛與血雜混而不滋榮氣之運或不化液而不從衛氣之用聚於經脈以為病冷則清如其飲熱則濁如其痰設值風火之迫則湧溢而起無處不到痰飲為病莫大於此肺胗許先生論梁寬父病右脅肺部也咳而唾血舉動喘逆者肺胗也發熱脈數不能食者火來刑金肺與脾俱虛也肺脾俱虛而火乘之其病為逆如此者例不可補瀉若補金則慮金與火持而喘咳益增瀉火則慮火不退位而痃癖反盛正宜補中益氣湯先扶元氣少以治病藥加之聞已用藥而未獲效必病勢苦逆而藥力未到也遠期秋涼庶可復耳蓋肺病惡春夏火氣至秋冬火退只宜於益氣湯中隨四時升降寒熱及見有症增損服之或覺氣壅間與加減枳朮丸或有飲間服局方枳朮湯數日逆氣少回逆氣回則治法可施但恐今日已至色青色赤及脈弦脈洪則無及矣病後不見色脈不能懸料以既愈復發言之惟宜依准四時用藥以扶元氣庶他日既愈不復發也其病初感必深且所傷物恐當時消導尚未盡停滯淹延變生他症以至於今宜少加消導藥於益氣湯中庶可漸取效也雜合邪治法丹溪曰雜合邪者當以雜合法治之譬如惡寒發熱得之感冒明是外邪脈得浮數而氣口又緊盛明是食傷病者又倦怠重按其脈俱有豁意而胸膈痞滿牽引兩脅輕者其脈又似乎弦此又平時多怒肝邪所為也細取左尺又似沉弱此又平時房勞之過也治法宜以感冒一節放下視其形色強弱厚薄且與補中化食行滯後涼胃火而以薑辣行之中氣稍回傷氣稍行津液得和通體得汗外邪自解若不審求只管表散又不推究兼見之邪脈又不窮問所得之病因與性情執著及巧施雜合治法將見正氣自虛邪氣自固皆拙工之過也藥病須要適當假如病大而湯劑小則邪氣少屈而藥力已乏欲不復治其可得乎猶以一杯水救一車薪火竟不得滅是謂不及若症小而湯劑大則邪氣已盡而藥力有餘欲不傷正其可得乎猶火熾昆崗玉石俱焚是謂太過三者之論惟中而已過與不及皆為偏廢然而太過尤甚於不及蓋失於姑息邪復勝正者只是勞而無益猶可勉而適中或失苛暴則正氣被傷因而羸瘠者有之危殆者有之此所謂尤甚也可不戒哉嘗考仲景於承氣條下則曰若更衣止後服於桂枝方下則曰微汗漐漐乃佳不可令如水淋漓其旨深矣小兒門小兒脈當以大指按三部一息六七至為平和十至為發熱五至為內寒緊為風癇沉緩為傷食促急為虛驚弦急為氣不和沉細為冷浮為風大小不勻為惡候為鬼祟浮大數為風為熱伏結為物聚單細為疳勞凡腹痛喘嘔而脈浮者為有蟲浮而遲潮熱者胃寒也溫之則愈歌曰小兒脈緊風癇候沉緩食傷多吐嘔弦急因知氣不和急促虛驚神不守冷則沉細風則浮牢實大便因秘久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必變不治自然無過謬單細疳勞洪有蟲大小不均為惡候脈浮而遲有潮熱此必內寒求內寇瀉利浮大不可醫仔細酌量宜審究小兒未可辨脈者俗醫多看虎口中紋顏色與四肢冷熱驗之亦有可取歌曰紫風紅傷寒青驚白色疳黑時因中惡黃則困脾端鼻冷定知是瘡疹耳冷因知風熱症遍身皆熱是傷寒上熱下冷傷食病人若以此色脈參佐驗之所得亦過半矣小兒病多是食積痰熱傷乳大抵肝與脾病多又云小兒多肝病大人亦然肝只是有余腎常是不足蛔蟲或臟腑虛弱或食甘肥則蟲動動則腹中痛發作腫聚往來上下痛不休止上攻心痛口喜吐涎及清水貫傷心者死其脈凡腹痛法當沉弱而弦今反洪大則是蟲也仲景用烏梅丸治之諸殺蟲藥皆可療使君子尤良蛔蟲束行吳茱萸根尤勝一人年十八自小面帶微黃五月間腹大痛醫以小建中加丁香兩帖不效加嘔吐清汁又與十八味丁香透膈湯兩帖食全不進痛無休止如此者五六日又與阿魏丸百餘粒至夜發熱不睡口卻不渴脈左二部沉弦而數實痛處不可按遂與大柴胡湯四帖加甘草下之痛嘔雖減食猶未進遂與小柴胡湯去黃芩人參加芍藥陳皮黃連生甘草二十帖而愈一人年十七家貧多勞十一月病惡寒而吐血兩三日六脈緊澀一月後食減中痞醫投溫膽湯枳殼湯三日後發熱口乾不渴口中有痰予曰此感寒也詢之八日前曾於霜中渡水三四次心下有悲泣事腹亦飢遂以小建中湯去芍藥加桔梗陳皮半夏四帖而愈丹瘤即內經丹熛由其丹之流走故名丹瘤古方所謂赤遊腫因肌肉虛為風毒熱氣所乘搏於氣血則肌膚赤而腫起其風隨氣行不定故名赤遊腫俗謂之瘤由風熱發丹流走經絡散發肌表如丹之赤如火之燒也若遍身發赤曰天火丹之類三十餘條治法隨其所在而鐮之泄去毒氣不爾則丹毒入腹近心則死但初發心痛者不可鐮爾用藥內飲外敷各有方大抵散風熱和氣活血涼肌而已原病式亦曰赤溜熱勝氣也火之色相火主之遊腫一熛一赤溜一也脫肛脫囊脫肛因下痢腸虛冷兼用驅氣故也脫囊者陰核腫大墜下即潰也小兒多因啼怒驅氣云云陰氣結聚不散所成也陰氣者厥氣也二氣下流納於厥陰與大人之㿉治法無異大抵囊因寒則縮因熱則縱因濕則重也木舌心氣蘊熱上氣隨脈上至於舌則血脈脹起漸腫滿口塞喉若不急治便至危殆宜先砭射用紫雪朴硝蒲黃之屬飲之解顱錢仲陽用地黃丸補其腎與此不同而實同也夜啼即驚啼由風邪乘心心臟精神不定故臥不安也夜啼臟冷故也夜陰氣盛與冷相搏則冷動與臟氣相併或煩或痛故夜啼亦有觸犯禁忌而啼可以法術斷之軀啼者胎傷風冷邪氣與正氣相搏則腹痛故軀脹蹙而啼大率治驚啼則以清肝心鎮神安魂之劑治夜啼則以溫平和利氣血之劑治軀啼亦然三因以夜啼有四曰寒曰熱曰重舌口瘡曰客忤腹痛其啼面青白口有冷氣腹亦冷曲腹而啼此寒症也心燥面赤小便赤口中熱腹暖啼或有汗仰身而啼此熱症也客忤見生人之氣忤犯而啼也治冷症以大蒜乳香和丸服熱症以燈花散重舌以炒蒲黃摻舌口瘡以牡蠣甘草摻口中客忤以灶中土蚯蚓糞水和塗兒頭上及五心由此而言方不在備也斑疹受胎七月其形已成食母穢液入兒五臟至十月滿胃脘中生時口中有不潔以手拭淨則無疾病以黃連汁壓之乃下臍糞及穢液也云云內一臟受穢乃出瘡疹瘡疹未出五臟皆見病症初欲病時先呵欠煩悶肝也時發驚悸心也乍涼乍熱手足冷脾也面赤腮頰赤嗽嚏肺也惟腎在臟腑下不能食穢故無候也凡五臟毒若去歸一症肝則水疱肺膿疱心斑脾疹惟腎無症瘡黑屬腎由不慎或內虛也用抱龍丸數服愈以其別無他候故也又瘡疹因小兒真氣既盛正氣既旺邪無所客故是以或因寒之傷表或傷里斑由是生焉中外皆和其斑自出至於未顯時外傷者升麻湯主之內傷者枳朮丸若傷冷濕神應丸惡寒者宜防風蒼朮湯發之表大熱者奪之通言三陽陽盛則必氣上行大渴者白虎湯小渴者涼膈散大便秘結桃仁承氣湯下之四順飲子柴胡飲子察其在氣在血小便不通導赤散八正散之類求上下二焦何經用之驚者涼驚丸重者瀉青丸泄者治分寒熱寒則異功散四君子湯熱則澤瀉茯苓湯已顯斑症出皮膚時如出不快化斑湯出太多犀角地黃湯地骨皮鼠黏子湯咽喉不利甘桔黏子湯煩者甘桔梔子楊肺不利紫草茸甘草枳殼湯太陽出不快荊芥甘草防風湯四肢出不快防風芍藥甘草湯或發不透倒靨黑陷極為利害紫草木通甘草枳殼黃耆等分服之斑疹遺毒或肝虛入眼或肺虛為疥癬或為癰癤發在骨節腎虛也發在肌肉脾虛也或在筋或在頭面或齒疳蝕咽喉腫痛各隨本經而見皆毒蘊積而成由其始不早治或醫者之失時也斑疹膿不焦此末治失清涼也察何經而涼之或下之而成大肅之氣則必不致膿而不痂矣斑疹以瘡發焮腫於外屬少陽三焦相火謂之斑以靨行於皮膚之中不出者屬少陰謂之疹云云東垣謂太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙丁火不得傳道逆於面上故顯面赤諸症蓋壬癸水克丙丁也斑症皆從寒水逆流而作夫胞者一名赤宮一名丹田一名命門主男子藏精施化女人系胞受胎俱是化生之原非五行也非水亦非火天地之異名象坤土之生萬物夫人始生血海始淨一日二日精勝其血則為男子三日四日血海已旺精不勝血則為女子乃二物相摶常先身生謂之神又謂之精釋道以為本來面目是也其子在母腹中十月之間隨母呼吸母呼亦呼母吸亦吸者陽氣也而主動作滋益精氣神飢渴食飲母血兒隨日長皮肉筋骨形氣血脈俱足十月降生口中尚有惡穢啼聲一發隨吸而下復歸命門胞中僻於一隅伏而不發直至內傷乳食濕熱之氣下流合於腎中二火交戰營氣不從逆於肉裡惡血乃散發諸斑瘡皆出於膀胱壬水其瘍潰後壞肉裡歸於陽明此皆從足太陽傳變中來當外發寒邪使令消散內瀉二火不令交攻其中又令濕氣上歸復其本位可一二服立已曰消毒救苦湯又謂斑疹皆營氣逆而寒覆其表宜以四味升麻湯加歸身連翹如肺成膿斑先顯喘嗽或氣高而喘促加人參黃芩以瀉伏火而補元氣如心出小紅斑先血溢驚悸加黃連如命門出癮疹先必骨疼身熱其痛不敢動搖少加生地黃黃柏諸疹先因乳食傷脾胃不足營氣逆行雖火勢內熾陰覆其表以四味升麻湯發之隨妥皆本仲景分經絡辨氣血定表裡如傷寒而用耳戴人謂瘡疹從胎毒而出者三焦少陽相火為也症發與傷寒兼行必先發熱惡寒頭項痛腰脊強從太陽傳至四五日始發先從兩脅下有之次及身表漸及四肢經曰少陽客勝丹熛外發謂痛瘡癢皆屬心火豈有寒乎初頭痛身熱惡寒此發瘡疱之候脈皆浮大有力亦與傷寒時氣驚風宿乳一概難辨宜先解之有二法亢陽炎熱之時以辛涼解之久寒凝冽之時以辛溫解之辛涼涼膈通聖散之類辛溫升麻葛根之類二法之後次以白虎加人參冷服之勿輟蓋防瘡疹發喘人參止喘四時皆宜用以救肺金受火邪致不足也或出不勻大小不齊以蟬殼燒灰淡酒調服不半日即勻或用百祥丸柴甘飲子皆可服至六七日瘡疹出全可用調胃涼膈下之每治黑陷腹內喘乏死病者白虎加人參涼膈加當歸桔梗連進數服使臥涼處以涼水灌其面目手足使循經而入如醉而醒是亦開結散郁之端如此救活甚多宋陳文中以瘡疹發遲倒陷等病用木香散異功散大熱發之豈宜例用諸說不同錢氏謂內外所傷感其胎毒為當李氏謂皆因內傷者不若錢氏以先微寒入而成瘡疹之一語為該內外也治是症者果二火熱盛瀉之分氣血表裡辨時令寒熱稟質壯怯病狀輕重隨宜用藥初無執一之說此篇所敘舉其大概耳其祥非筆舌可盡驚急慢驚風病機以一言統之謂諸熱瞀瘈諸病驚駭皆屬於火云云方論急驚為陽癇慢驚為陰癇治法清心涼肝安神定魄用辰砂牛黃吊藤蘆薈全蠍天麻龍齒虎睛南星膩粉腦麝之類錢氏謂急驚屬腑受病熱客於心膈少陽相火旺熱則生風聞木音而作蓋風木得火而發搐火得邪風而動用利驚丸導赤散瀉青丸地黃丸搐服安神丸慢驚屬臟受病蓋因吐瀉病久脾胃虛損不早治而成也瘛瘲似發搐不甚搐因脾胃虛損大便不聚當去脾間風先以利道後用使君子丸益黃散則利自止矣若脾胃俱虛被肝木所勝為慢驚用溫補羌活膏五福丸治急驚風生蚯蚓一條斫爛入五福化毒研如泥薄荷湯化下有發搐潮熱於寅卯辰位是肝症補腎水以制心火瀉肝木以止搐潮熱於巳午未者心熱也導赤散瀉青丸瀉肝益黃散補脾夜發因大病後脾胃虛補脾涼心傷風發搐口中熱呵欠頓悶急絕手足搖亦陰陽二症有汗無汗用大青膏小續命湯之類傷食發搐煎羌活防風湯化下大青膏後用白餅子下其食漸已調中丸異功散養其氣由是急慢驚風即為癇也先生治痰有輕重未嘗獨用吐湧若小兒胎氣弱色白骨細肉軟聲微者必用補氣血兼治其驚臟腑堅壯痰壅不得已而吐未常例施小兒少火縱盛陰氣未壯不當攻擊內經謂肝腎虛者脈急為受寒肝不足者皆發驚候必隨所變而治予述諸書五邪補瀉與先生之法而參用疳疳有五皆以肥美而得之故曰疳五臟所受不同在肝為風疳在心為驚疳在脾為食疳在肺為氣疳在腎為急疳五疳之外十二經氣血所受變狀不一復有驚絕疳乾疳漏疳腦疳絕急疳無辜疳齒疳濁疳痢疳慝疳五疳出蟲等候云云數百方中雖有攻補終無先後設施與相兼分輕重而治的然之法所治五疳亦未見有分五臟補瀉之藥且宜於金者不宜木宜於火者不宜土五臟升降浮沉之氣寒熱溫涼之性不及則順而調之太過則逆而治之吃黃土因脾經濕熱故口失味也宜用干黃土些少碾細炒過濃煎黃連湯調服或作丸服亦妙小便不通炙內關三壯立通變蒸變蒸以長血氣變者上氣蒸者體熱亦有輕重輕者體熱微驚耳冷髖亦冷上唇有白疱如魚目珠子微汗出近者五日而歇遠者八九日乃歇重者體壯熱而脈亂或汗或不汗不欲食食輒吐哯無所苦也十變蒸時白睛微赤黑睛微白亦無所苦蒸畢目自明矣先變五日後蒸五日十月熱除變蒸之時不欲驚動勿令傍邊多人變蒸有早有晚依時如法者少也初變之時通日數熱甚不歇用肝黑散發熱汗不止服紫霜丸少瘥便止變蒸時遇寒加之則寒熱交爭腹痛嬌啼不止者慰之則愈變蒸為溫壯傷寒相似若身熱耳熱髖熱此乃他症非變蒸也其變蒸日數從初生至三十二日一變六十四日再變比三百二十日而十變五蒸為小蒸後六十四日為太蒸凡四蒸總積五百七十六日而變蒸足氣血就也其變蒸運動於陰陽之間者少火也少火運動遂有生新推陳之功氣血之新者既生何胎毒不散之有婦人門安胎固胎養胎必當察其由來之邪分其胎之所損在氣在血何者之虛其胎與母受病孰先孰後方制君臣佐使各適其宜豈可守已定之方執而不通耶惡阻與胎化不成惡阻與胎化不成何如曰一月始形二月始膏三月精血始化為胎男女分矣所謂惡阻與胎之成否皆在三月相火化胎之時惡阻者由相火化精血為胎而子宮穢腐因火沖逆上攻於胃有傷其味故食不得入津液亦不化停積為痰為飲為嘔吐此以子宮穢氣所阻其食故名惡阻前人未明相火之道故止言由中氣壅實故惡聞食氣若夫不成胎者有二焉一為母身之天真不足以化其胎一為父精不足皆致子宮與天賦凝結之真不全故在三月則化不成形也有當時即漏下者有待十月如產者一婦年三十餘或經住或成形未具其胎必墮察其性急多怒色黑氣實此相火火盛不能生氣化胎反食氣傷精故也因今住經第二月用黃芩白朮當歸甘草服至三月盡止藥後得一子一婦經住三月後尺脈或澀或微弱其婦卻無病知是子宮真氣不全故陽不施陰不化精血雖凝終不成形至產血塊或產血胞一婦腹漸大如懷子至十月求易產藥察其神色甚困難與之藥不數日產白蟲半桶蓋由婦之元氣大虛精血雖凝不能成胎而為穢腐蘊積之久濕化為熱濕熱生蟲理之所有亦須周十月之氣發動而產終是不祥其婦不及月死濕熱生蟲譬之溝渠汙濁積久不流則諸蟲生於其中矣產難或先漏去血而臟燥或子臟宿挾疹病或始覺腹痛先驚動穢血早下致子道乾澀產婦力疲皆令產難其橫生逆產皆因用力太早兒轉身未竟故也若穢露盡而胎橫燥子不得出必死於腹下胎之方不過瞿麥車前之屬潤燥者牛穌白蜜又古方下死胎而用寒熱藥蓋有意焉或因漏血儘子死或攧撲內傷子死或久病胎萎子死若此類臟腑氣寒胎血凝聚湮於死子氣不升降所以難產宜附子湯溫其內仍熱熨覆臍腹腰脅於外使惡血漸動蓋附子皆破寒墮胎故胎必下或熱病溫瘧之類胎受熱毒內外攻逼因致產難宜承氣湯產難有五不治一腹底不覺疼二抱著腳足垂嚲無力三病未退遍身不暖四臟腑泄吐清涎及沫不止五項筋展舒無力皆不治死胎血凝腹必脹大宜硝石水銀碙砂三藥性味不惟使胎化爛輔以行血順氣必下矣膏粱之婦多食肥美而生內熱則腎之陰水不足以養胎而胎萎弱運動不健所以陰虛陽盛而氣不降則胎不下又或安逸久坐久臥皆傷其氣則氣衰血滯因此母之氣虛不能送胎胎氣弱不能番轉故胎亦難下悲憂離情氣必鬱結血隨氣行氣鬱血必滯故亦難也下胎之藥必分氣結與氣血弱而治余每於膏粱安逸之婦將產時無他症者必用參朮芎歸甘草芍藥黃芩大腹皮氣虛甚者服此使子母氣健及期加益母草與一二服不生餘症憂悲氣結氣鬱甚者加枳殼砂仁香附大抵使子母氣血健運不惟使胎速下且使產後無虛損病也又有脾胃中氣不足氣血二海衝任之脈不得稟水穀氣致難產者得參術補氣血藥以助之則水穀榮衛之氣流行而產自易矣豈獨守難產之病概與下胎之藥而已哉試妊婦男女法上圊時夫從後急呼之左回首是男右回首是女蓋男受胎於左子宮女受胎於右子宮男胎在左則左重故回首時慎護重處而就左也女胎在右則右重故回首時慎護重處而就右也推之於脈其義亦然胎在左則氣血護胎而盛於左故脈亦從之而左疾為男左大為男也胎在右則血氣護胎而盛於右故脈亦從之而右疾為女右大為女也經曰陰搏陽別謂之有子言受胎處在臍腹之下則血氣護胎而盛於下故陰之尺脈鼓搏有力而與陽之寸脈殊別也又如癰癤發上則血氣從上而寸脈盛發下則血氣從下而尺脈盛發左則血氣從左而左脈盛發右則血氣從右而右脈盛也
